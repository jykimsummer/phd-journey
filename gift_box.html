<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎁 운명의 선물상자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
body{background:linear-gradient(180deg,#1a1040 0%,#2d1b69 50%,#42275a 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
.topmenu{position:fixed;top:12px;right:12px;z-index:100;display:flex;gap:8px;}
.topmenu button,.topmenu a{background:rgba(25,25,45,.5);border:1px solid rgba(255,255,255,.4);color:#fff;padding:8px 12px;border-radius:20px;text-decoration:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);line-height:1;}
.topmenu button:active,.topmenu a:active{background:rgba(25,25,45,.78);}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:.2}to{opacity:.9}}
#stage{position:relative;z-index:2;width:100%;max-width:560px;padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;}
h1{font-size:clamp(26px,7vw,40px);text-shadow:0 4px 12px rgba(0,0,0,.5);}
.sub{font-size:clamp(15px,4vw,19px);color:#ffd9a0;min-height:26px;}
/* ===== 선물상자 ===== */
#boxRow{display:flex;justify-content:center;gap:5vw;width:100%;margin-top:8px;height:190px;align-items:flex-end;}
.gift{position:relative;width:110px;height:130px;cursor:pointer;transition:transform .3s,opacity .4s,filter .4s;animation:bob 2.2s ease-in-out infinite;}
.gift:nth-child(2){animation-delay:.3s}
.gift:nth-child(3){animation-delay:.6s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.gift .body{position:absolute;bottom:0;width:110px;height:90px;border-radius:8px;box-shadow:inset -10px -10px 0 rgba(0,0,0,.15),0 8px 20px rgba(0,0,0,.4);}
.gift .lid{position:absolute;bottom:82px;left:-8px;width:126px;height:30px;border-radius:6px;box-shadow:inset -8px -6px 0 rgba(0,0,0,.15),0 3px 8px rgba(0,0,0,.3);transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .5s;z-index:3;}
.gift .ribbonV{position:absolute;bottom:0;left:45px;width:20px;height:90px;background:rgba(255,255,255,.85);z-index:2;}
.gift .ribbonL{position:absolute;bottom:105px;left:20px;width:34px;height:26px;border:7px solid rgba(255,255,255,.9);border-radius:50% 50% 0 50%;transform:rotate(-20deg);z-index:4;}
.gift .ribbonR{position:absolute;bottom:105px;right:20px;width:34px;height:26px;border:7px solid rgba(255,255,255,.9);border-radius:50% 50% 50% 0;transform:rotate(20deg);z-index:4;}
.gift.red .body,.gift.red .lid{background:#ff5a6e}
.gift.gold .body,.gift.gold .lid{background:#ffb347}
.gift.blue .body,.gift.blue .lid{background:#5aa9ff}
.gift .num{position:absolute;top:-34px;width:100%;font-size:22px;font-weight:800;color:#ffe9b0;text-shadow:0 2px 6px rgba(0,0,0,.6);}
.gift.dim{opacity:.12;filter:grayscale(1);pointer-events:none;}
.gift.chosen{transform:scale(1.35);z-index:10;animation:none;}
.gift.shake1{animation:shk .5s infinite}
.gift.shake2{animation:shk .25s infinite}
.gift.shake3{animation:shk .12s infinite}
@keyframes shk{0%{transform:scale(1.35) rotate(-3deg) translateX(-3px)}50%{transform:scale(1.35) rotate(3deg) translateX(3px)}100%{transform:scale(1.35) rotate(-3deg) translateX(-3px)}}
.gift.open .lid{transform:translateY(-140px) rotate(25deg);opacity:0;}
.gift.open .ribbonL,.gift.open .ribbonR{opacity:0;transition:opacity .3s;}
/* 스포트라이트 */
#dimmer{position:fixed;inset:0;background:radial-gradient(circle at 50% 62%,transparent 130px,rgba(0,0,0,.88) 340px);opacity:0;pointer-events:none;transition:opacity .8s;z-index:5;}
#dimmer.on{opacity:1;}
#drumText{position:fixed;top:16%;width:100%;text-align:center;font-size:clamp(24px,8vw,44px);font-weight:900;color:#ffd54a;text-shadow:0 0 20px rgba(255,180,0,.8);opacity:0;z-index:6;letter-spacing:2px;}
#drumText.on{opacity:1;animation:pulse .3s infinite alternate;}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.12)}}
/* 결과 카드 */
#resultCard{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(10,5,30,.75);backdrop-filter:blur(3px);}
#resultCard.show{display:flex;}
.card{background:linear-gradient(160deg,#fff,#ffeeda);color:#3a2a1a;border-radius:24px;padding:38px 30px;max-width:420px;width:88%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:rise .7s cubic-bezier(.34,1.56,.64,1);}
@keyframes rise{from{transform:translateY(120px) scale(.6);opacity:0}to{transform:none;opacity:1}}
.card .emoji{font-size:70px;}
.card h2{font-size:clamp(22px,6vw,30px);margin:14px 0 8px;}
.card p{font-size:16px;color:#7a6a55;line-height:1.5;}
.card.study{background:linear-gradient(160deg,#eef4ff,#dce8ff);color:#1a2a4a;}
.card.study p{color:#4a5a7a;}
.btn{margin-top:22px;background:linear-gradient(135deg,#ff8a5c,#ff5a6e);color:#fff;border:none;font-size:18px;font-weight:700;padding:14px 34px;border-radius:30px;cursor:pointer;box-shadow:0 6px 16px rgba(255,90,110,.45);font-family:inherit;}
.btn.blue{background:linear-gradient(135deg,#5aa9ff,#7a6bff);box-shadow:0 6px 16px rgba(90,120,255,.45);}
#startBtn{font-size:22px;padding:16px 44px;}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:30;}
#history{font-size:13px;color:rgba(255,255,255,.55);margin-top:4px;}
</style>
</head>
<body>
<div class="topmenu">
  <button onclick="location.reload()">🔄 처음부터</button>
  <a href="index.html">🏠 홈으로</a>
</div>
<div class="stars" id="starField"></div>
<div id="stage">
  <h1>🎁 운명의 선물상자</h1>
  <div class="sub" id="subText">오늘 밤의 운명은 상자 속에...</div>
  <div id="boxRow">
    <div class="gift red" data-i="0"><div class="num">1</div><div class="body"></div><div class="ribbonV"></div><div class="lid"></div><div class="ribbonL"></div><div class="ribbonR"></div></div>
    <div class="gift gold" data-i="1"><div class="num">2</div><div class="body"></div><div class="ribbonV"></div><div class="lid"></div><div class="ribbonL"></div><div class="ribbonR"></div></div>
    <div class="gift blue" data-i="2"><div class="num">3</div><div class="body"></div><div class="ribbonV"></div><div class="lid"></div><div class="ribbonL"></div><div class="ribbonR"></div></div>
  </div>
  <button class="btn" id="startBtn">🔮 운명 뽑기 시작</button>
  <div id="history"></div>
</div>
<div id="dimmer"></div>
<div id="drumText">두구두구두구...</div>
<div id="resultCard"><div class="card" id="cardInner"></div></div>
<canvas id="confetti"></canvas>
<script>
'use strict';
/* ---------- 별 배경 ---------- */
const sf=document.getElementById('starField');
for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+1;
s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*2}s`;sf.appendChild(s);}

/* ---------- 오디오 (Web Audio) ---------- */
let AC=null;
function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function drumHit(vol){const c=ac(),t=c.currentTime;
const b=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate),d=b.getChannelData(0);
for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
const src=c.createBufferSource();src.buffer=b;
const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=300;
const g=c.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
src.connect(f).connect(g).connect(c.destination);src.start(t);}
function tone(freq,dur,type,vol,when){const c=ac(),t=c.currentTime+(when||0);
const o=c.createOscillator(),g=c.createGain();o.type=type||'triangle';o.frequency.value=freq;
g.gain.setValueAtTime(vol||.2,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur);}
function fanfare(){[523,659,784,1047].forEach((f,i)=>tone(f,.35,'triangle',.25,i*.13));tone(1319,.7,'triangle',.28,.55);}
function womp(){tone(300,.4,'sawtooth',.15,0);tone(230,.5,'sawtooth',.15,.35);tone(160,.9,'sawtooth',.18,.75);}

/* ---------- 게임 상태 ---------- */
const boxes=[...document.querySelectorAll('.gift')];
const sub=document.getElementById('subText'), startBtn=document.getElementById('startBtn');
const dimmer=document.getElementById('dimmer'), drumText=document.getElementById('drumText');
const resultCard=document.getElementById('resultCard'), cardInner=document.getElementById('cardInner');
const history=document.getElementById('history');
let phase='idle', stats={study:0,rest:0};

/* 섞기 없음: 시작 버튼 숨기고 바로 상자 선택 */
startBtn.style.display='none';
enableChoice();

/* ---------- 상자 선택 ---------- */
function enableChoice(){
  phase='choose';
  sub.textContent='상자를 하나 선택하세요! 👆';
  boxes.forEach(b=>b.addEventListener('click',pick,{once:false}));
}
function pick(e){
  if(phase!=='choose')return;
  ac();
  phase='drum';
  const chosen=e.currentTarget;
  boxes.forEach(b=>{b.removeEventListener('click',pick);if(b!==chosen)b.classList.add('dim');});
  chosen.classList.add('chosen');
  sub.textContent='';
  dimmer.classList.add('on');
  drumText.classList.add('on');
  if(navigator.vibrate)navigator.vibrate([80,60,80]);
  runDrumroll(chosen);
}
/* ---------- 3단계: 두구두구 (점점 빨라짐 + 페이크 정적) ---------- */
function runDrumroll(chosen){
  let elapsed=0, interval=190;
  chosen.classList.add('shake1');
  const texts=['두구두구두구...','두구두구두구!!'];
  function step(){
    drumHit(.5); elapsed+=interval;
    if(elapsed>650&&interval>120){interval=120;chosen.classList.replace('shake1','shake2');drumText.textContent=texts[1];}
    if(elapsed>1200&&interval>70){interval=70;chosen.classList.replace('shake2','shake3');if(navigator.vibrate)navigator.vibrate(30);}
    if(elapsed>=1750){
      chosen.classList.remove('shake3');
      reveal(chosen);
      return;
    }
    setTimeout(step,interval);
  }
  step();
}
/* ---------- 4단계: 개봉 ---------- */
function reveal(chosen){
  const isStudy=Math.random()<0.5;   /* 50:50 순수 랜덤 */
  chosen.classList.add('open');
  drumText.classList.remove('on');
  if(navigator.vibrate)navigator.vibrate([120,50,200]);
  setTimeout(()=>{
    if(isStudy){stats.study++;womp();showCard('study','📚','논문 쓰러가기 당첨~~','미래의 박사님, 오늘 한 페이지가 학위를 만듭니다 🔥');}
    else{stats.rest++;fanfare();burstConfetti();showCard('rest','🛋️','오늘은 쉬기 당첨~~','축하합니다! 충전도 연구의 일부입니다 ☕<br>죄책감 없이 푹 쉬세요 🎉');}
  },500);
}
function showCard(type,emoji,title,msg){
  cardInner.className='card '+(type==='study'?'study':'');
  cardInner.innerHTML=`<div class="emoji">${emoji}</div><h2>${title}</h2><p>${msg}</p>
  <button class="btn ${type==='study'?'blue':''}" onclick="location.reload()">🔄 다시 뽑기</button>`;
  resultCard.classList.add('show');
  const h=JSON.parse(sessionStorage.getItem('giftStats')||'{"study":0,"rest":0}');
  h.study+=(type==='study'?1:0);h.rest+=(type==='rest'?1:0);
  sessionStorage.setItem('giftStats',JSON.stringify(h));
}
/* 세션 기록 표시 */
(function(){const h=JSON.parse(sessionStorage.getItem('giftStats')||'{"study":0,"rest":0}');
if(h.study+h.rest>0)history.textContent=`오늘의 기록 — 📚 논문 ${h.study}회 · 🛋️ 쉬기 ${h.rest}회`;})();

/* ---------- 폭죽 ---------- */
const cv=document.getElementById('confetti'),cx=cv.getContext('2d');
function burstConfetti(){
  cv.width=innerWidth;cv.height=innerHeight;
  const ps=[];const colors=['#ff5a6e','#ffb347','#5aa9ff','#7bffb0','#ff8ae0','#fff36b'];
  for(let i=0;i<140;i++)ps.push({x:innerWidth/2,y:innerHeight*.6,vx:(Math.random()-.5)*14,vy:-Math.random()*15-4,
    s:Math.random()*7+4,c:colors[i%6],r:Math.random()*Math.PI,vr:(Math.random()-.5)*.3});
  let f=0;
  (function anim(){
    cx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.r+=p.vr;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cx.restore();});
    if(++f<130)requestAnimationFrame(anim);else cx.clearRect(0,0,cv.width,cv.height);
  })();
}
</script>
</body>
</html>
