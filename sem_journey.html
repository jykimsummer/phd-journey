<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎓 박사의 여정 — SEM 물총 원정대</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0a1530;color:#fff;}
.topmenu{position:fixed;top:10px;right:10px;z-index:100;display:flex;gap:8px;}
.topmenu button,.topmenu a{background:rgba(25,25,45,.55);border:1px solid rgba(255,255,255,.45);color:#fff;padding:7px 12px;border-radius:20px;text-decoration:none;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;}
.topmenu button:active,.topmenu a:active{background:rgba(25,25,45,.8);}
#game{position:fixed;inset:0;touch-action:none;}
/* ===== 시작/결과 ===== */
.screen{position:fixed;inset:0;background:linear-gradient(180deg,#122250,#2a1a50);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;padding:20px;text-align:center;overflow-y:auto;}
.screen h1{font-size:clamp(24px,6.5vw,36px);}
.screen .desc{color:#aab;font-size:14.5px;line-height:1.65;}
.chars{display:flex;gap:16px;}
.ccard{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);border-radius:18px;padding:16px 22px;cursor:pointer;transition:.2s;}
.ccard.sel{border-color:#ffd54a;background:rgba(255,213,74,.15);transform:scale(1.06);}
.ccard .ci{font-size:52px}.ccard .cn{font-weight:800;margin-top:6px;font-size:15px}
.kids{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:330px;}
.kcard{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);border-radius:14px;padding:8px 10px;cursor:pointer;transition:.15s;min-width:62px;}
.kcard.sel{border-color:#7bffb0;background:rgba(123,255,176,.16);transform:scale(1.05);}
.kcard .ci{font-size:24px;line-height:1}.kcard .cn{font-weight:700;margin-top:3px;font-size:12px}
.inputWrap{display:flex;flex-direction:column;gap:6px;align-items:center;}
.inputWrap label{font-size:14px;color:#ffd9a0;font-weight:700;}
#profName{font-size:17px;padding:12px 18px;border-radius:14px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;text-align:center;width:240px;font-family:inherit;outline:none;}
#profName::placeholder{color:rgba(255,255,255,.4);}
.bigbtn{background:linear-gradient(135deg,#5aa9ff,#7a6bff);border:none;color:#fff;font-size:20px;font-weight:800;padding:15px 42px;border-radius:30px;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(90,120,255,.4);}
/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:0;padding:10px 12px;display:flex;align-items:center;gap:12px;z-index:20;pointer-events:none;font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.6);}
#timer{font-size:20px;color:#ffd54a;}
#prog{font-size:14px;color:#bfe0ff;}
/* ===== 조작 버튼 ===== */
#ctrl{position:fixed;bottom:16px;left:0;right:0;display:none;justify-content:space-between;padding:0 16px;z-index:20;}
.cbtn{width:66px;height:66px;border-radius:50%;border:3px solid rgba(255,255,255,.5);background:rgba(255,255,255,.18);color:#fff;font-size:26px;cursor:pointer;backdrop-filter:blur(3px);touch-action:none;}
.cbtn:active{background:rgba(255,255,255,.4);}
#ctrl .grp{display:flex;gap:12px;}
/* ===== 퀴즈 ===== */
#quiz{position:fixed;inset:0;background:rgba(5,10,30,.9);display:none;align-items:center;justify-content:center;z-index:60;padding:16px;}
#quiz.show{display:flex;}
.qbox{background:linear-gradient(160deg,#fff,#eef6ff);color:#16233f;border-radius:20px;padding:24px 20px;max-width:460px;width:97%;text-align:center;position:relative;}
.qclose{position:absolute;top:10px;right:12px;width:34px;height:34px;border:none;border-radius:50%;background:#e6ecfa;color:#3a4a6a;font-size:19px;font-weight:900;cursor:pointer;font-family:inherit;line-height:1;}
.qclose:active{background:#d3ddf3;}
.qbox .qtag{font-size:13px;font-weight:800;color:#e2618f;margin-bottom:8px;}
.qbox .qtext{font-size:clamp(16px,4.4vw,20px);font-weight:800;line-height:1.5;margin-bottom:15px;}
.qopts{display:flex;flex-direction:column;gap:8px;}
.qopt{background:#fff;border:2px solid #ccd5ee;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left;color:#16233f;}
.qopt.ok{background:#d9ffe3;border-color:#3ecf6e;}
.qopt.no{background:#ffe0e0;border-color:#ff7a7a;}
.qmsg{margin-top:11px;font-size:14px;font-weight:700;min-height:20px;color:#556;}
.qactions{display:flex;gap:8px;margin-top:14px;}
.qact{flex:1;border:none;border-radius:12px;padding:11px 8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;background:#e6ecfa;color:#2a3a6a;}
.qact.skip{background:#fff0e0;color:#8a5a10;}
.qact:active{transform:scale(.97);}
#bubble{position:fixed;padding:10px 16px;background:#fff;color:#333;border-radius:16px;font-size:14px;font-weight:700;z-index:30;display:none;box-shadow:0 4px 14px rgba(0,0,0,.35);max-width:260px;line-height:1.45;}
#bubble:after{content:'';position:absolute;bottom:-9px;left:28px;border:10px solid transparent;border-top-color:#fff;border-bottom:0;}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:70;}
</style>
</head>
<body>
<div class="topmenu">
  <button onclick="location.reload()">🔄 처음부터</button>
  <a href="index.html">🏠 홈으로</a>
</div>
<canvas id="game"></canvas>
<div id="hud" style="display:none">
  <div id="timer">5:00</div>
  <div id="prog">🎓 0%</div>
</div>
<div id="ctrl">
  <div class="grp"><button class="cbtn" id="btnL">◀</button><button class="cbtn" id="btnR">▶</button></div>
  <div class="grp"><button class="cbtn" id="btnJ">⬆</button></div>
</div>
<div id="bubble"></div>

<div class="screen" id="startScreen">
  <h1>🎓 박사의 여정 : SEM 퀴즈</h1>
  <div class="desc">SEM, 어디까지 알고 있니? 🤔<br>SEM으로 학위논문 쓸 준비 되셨는지 알아보아요.</div>
  <div class="chars">
    <div class="ccard sel" data-c="0"><div class="ci">👨‍🎓</div><div class="cn">박사님 (남)</div></div>
    <div class="ccard" data-c="1"><div class="ci">👩‍🎓</div><div class="cn">박사님 (여)</div></div>
  </div>
  <div class="inputWrap">
    <label>함께 가는 자녀 (손잡고 여정!)</label>
    <div class="kids">
      <div class="kcard sel" data-k="none"><div class="ci">🚶</div><div class="cn">혼자</div></div>
      <div class="kcard" data-k="g1"><div class="ci">👧</div><div class="cn">딸 1</div></div>
      <div class="kcard" data-k="g2"><div class="ci">👧👧</div><div class="cn">딸 2</div></div>
      <div class="kcard" data-k="b1"><div class="ci">👦</div><div class="cn">아들 1</div></div>
      <div class="kcard" data-k="b2"><div class="ci">👦👦</div><div class="cn">아들 2</div></div>
      <div class="kcard" data-k="gb"><div class="ci">👧👦</div><div class="cn">딸·아들</div></div>
    </div>
  </div>
  <div class="inputWrap">
    <label>지도교수 성함:</label>
    <input id="profName" placeholder="예: 김민수" maxlength="10">
  </div>
  <button class="bigbtn" id="goBtn">🚀 여정 시작</button>
</div>

<div class="screen" id="endScreen" style="display:none">
  <div id="endEmoji" style="font-size:76px"></div>
  <h1 id="endTitle"></h1>
  <div class="desc" id="endDesc"></div>
  <button class="bigbtn" onclick="location.reload()">🔄 다시 도전</button>
</div>

<div id="quiz">
  <div class="qbox">
    <button class="qclose" id="qClose">✕</button>
    <div class="qtag" id="qTag">🧱 지식의 벽!</div>
    <div class="qtext" id="qText"></div>
    <div class="qopts" id="qOpts"></div>
    <div class="qmsg" id="qMsg"></div>
    <div class="qactions">
      <button class="qact" id="qReroll">🔄 다른 문제로 도전</button>
      <button class="qact skip" id="qSkip">➡️ 이번엔 지나가기</button>
    </div>
  </div>
</div>
<canvas id="confetti"></canvas>

<script>
'use strict';
/* ================= SEM 퀴즈 은행 (4지선다) ================= */
const SEM_QUIZ=[
 {q:"매개효과를 검증하기 위해 가장 권장되는 방법은?",o:["Sobel test","단순회귀 반복","부트스트래핑","산점도 확인"],a:2},
 {q:"CFI의 통과 기준은?",o:[".50 이상",".70 이상",".90 이상","1.0 초과"],a:2},
 {q:"RMSEA의 수용 기준은?",o:[".08 이하",".30 이하",".90 이상","2.0 이하"],a:0},
 {q:"SRMR의 양호 기준은?",o:[".08 이하",".50 이상",".90 이상","3 이하"],a:0},
 {q:"TLI(NNFI)의 통과 기준은?",o:[".10 이하",".90 이상",".50 이상","5 이하"],a:1},
 {q:"χ²/df (Q값)의 일반적 기준은?",o:["10 이하","3 이하",".90 이상","100 이상"],a:1},
 {q:"χ² 검정의 대표적 한계는?",o:["계산이 불가능함","표본크기에 민감함","항상 유의하지 않음","적합도와 무관함"],a:1},
 {q:"부트스트래핑에서 간접효과가 유의하려면?",o:["95% CI에 0이 포함되지 않아야","95% CI에 0이 포함되어야","p값이 1이어야","CI가 음수여야"],a:0},
 {q:"완전매개란?",o:["직접효과만 유의","매개 투입 시 직접효과가 유의하지 않음","모든 경로 유의","간접효과 없음"],a:1},
 {q:"부분매개란?",o:["직접·간접효과 모두 유의","간접효과만 유의","아무 효과 없음","측정오차가 큼"],a:0},
 {q:"조절효과 검증 시 모형에 투입하는 것은?",o:["상호작용항(X×W)","절편항","오차항","더미변수만"],a:0},
 {q:"상호작용항의 다중공선성을 줄이는 방법은?",o:["표본 축소","평균중심화","변수 삭제","로그변환만"],a:1},
 {q:"간접효과의 크기는?",o:["a+b","a×b","a−b","a÷b"],a:1},
 {q:"AVE(평균분산추출)의 기준은?",o:[".5 이상",".05 이하",".9 이하","1 초과"],a:0},
 {q:"개념신뢰도(CR)의 기준은?",o:[".2 이상",".7 이상",".08 이하","3 이상"],a:1},
 {q:"Cronbach's α의 일반적 기준은?",o:[".7 이상",".07 이상",".1 이하","10 이상"],a:0},
 {q:"판별타당도 확인 방법(Fornell-Larcker)은?",o:["AVE > 상관계수 제곱","AVE < 상관계수","CR < .5","α = 0"],a:0},
 {q:"표준화 요인부하량의 최소 기준은?",o:[".05 이상",".5 이상","5 이상",".01 이하"],a:1},
 {q:"CFA가 EFA와 다른 점은?",o:["이론에 근거해 구조를 미리 지정","요인 수를 모름","회전이 필수","상관을 못 봄"],a:0},
 {q:"Anderson & Gerbing의 2단계 접근이란?",o:["측정모형 검증 후 구조모형 검증","구조모형만 두 번","EFA 두 번","무작위 분할"],a:0},
 {q:"잠재변수란?",o:["직접 측정 불가, 지표로 추정하는 변수","항상 관측되는 변수","오차가 없는 변수","더미변수"],a:0},
 {q:"외생변수란?",o:["다른 변수의 영향을 받지 않는 변수","항상 종속인 변수","오차항","매개변수"],a:0},
 {q:"SEM에서 가장 널리 쓰는 추정법은?",o:["최소제곱법만","최대우도법(ML)","눈대중","중앙값 추정"],a:1},
 {q:"ML 추정의 핵심 가정은?",o:["다변량 정규성","완전 무작위 결측","등간척도 불필요","표본 30 미만"],a:0},
 {q:"모형 식별의 필요 조건은?",o:["자유도 0 이상","자유도 음수","모수 무한","표본 10 이하"],a:0},
 {q:"포화모형의 자유도는?",o:["0","1","100","음수"],a:0},
 {q:"SEM = 요인분석 + ?",o:["회귀분석(경로분석)","t검정","카이제곱만","군집분석"],a:0},
 {q:"수정지수(MI) 사용 시 주의점은?",o:["이론적 근거가 있어야 함","무조건 다 반영","클수록 무시","표본과 무관"],a:0},
 {q:"SEM 표본 크기의 일반적 권장치는?",o:["200 이상","10 이상","5 이하","무관"],a:0},
 {q:"경로계수 유의성 판단 기준(C.R.)은?",o:["±1.96 이상","±0.1 이상","0이면 유의","1 미만"],a:0},
 {q:"Sobel test의 한계는?",o:["간접효과의 정규성 가정","계산 불가","항상 유의","CI를 제공"],a:0},
 {q:"조절된 매개분석에 널리 쓰이는 도구는?",o:["PROCESS macro (Hayes)","엑셀 정렬","워드클라우드","막대그래프"],a:0},
 {q:"모형 비교에 쓰며 작을수록 좋은 지수는?",o:["AIC/BIC","CFI","요인부하량","α"],a:0},
 {q:"RMSEA .05~.08 구간의 해석은?",o:["수용 가능한 적합도","매우 나쁨","완벽함","판단 불가"],a:0},
 {q:"집중(수렴)타당도 확인 지표가 아닌 것은?",o:["AVE","CR","요인부하량","VIF"],a:3},
 {q:"정규성 위반 시 대안적 추정법은?",o:["Bootstrap ML / WLSMV","눈대중 추정","표본 삭제","절편 제거"],a:0}
];
let pool=[...SEM_QUIZ].sort(()=>Math.random()-.5),poolIdx=0;
function nextQ(){if(poolIdx>=pool.length){pool.sort(()=>Math.random()-.5);poolIdx=0;}return pool[poolIdx++];}

/* ================= 사운드 & TTS ================= */
let AC=null;function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,d,t,v,w){try{const c=ac(),s=c.currentTime+(w||0),o=c.createOscillator(),g=c.createGain();o.type=t||'triangle';o.frequency.value=f;g.gain.setValueAtTime(v||.12,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.connect(g).connect(c.destination);o.start(s);o.stop(s+d);}catch(e){}}
function splashSound(){try{const c=ac(),t=c.currentTime,b=c.createBuffer(1,c.sampleRate*.3,c.sampleRate),d=b.getChannelData(0);
for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
const s=c.createBufferSource();s.buffer=b;const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=900;
const g=c.createGain();g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
s.connect(f).connect(g).connect(c.destination);s.start(t);}catch(e){}}
let koVoice=null;
function loadVoices(){const vs=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('ko'));
koVoice=vs.find(v=>/yuna|heami|sora|female|여/i.test(v.name))||vs[0]||null;}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function speak(txt){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);
if(koVoice)u.voice=koVoice;u.lang='ko-KR';u.pitch=1.2;u.rate=0.95;speechSynthesis.speak(u);}catch(e){}}

/* ================= 상태 ================= */
const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W,H,DPR=1;
function resize(){
 DPR=Math.min(window.devicePixelRatio||1,2.5);
 W=innerWidth;H=innerHeight;
 cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
 cv.style.width=W+'px';cv.style.height=H+'px';
 cx.setTransform(DPR,0,0,DPR,0,0);
 cx.imageSmoothingEnabled=true;
}
resize();addEventListener('resize',resize);
let charSel=0, profName='지도';
document.querySelectorAll('.ccard').forEach(c=>c.addEventListener('click',()=>{
 document.querySelectorAll('.ccard').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');charSel=+c.dataset.c;}));
/* 자녀 선택 */
let kidSel='none', kids=[];
document.querySelectorAll('.kcard').forEach(c=>c.addEventListener('click',()=>{
 document.querySelectorAll('.kcard').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');kidSel=c.dataset.k;}));
function buildKids(){
 const map={none:[],g1:['g'],g2:['g','g'],b1:['b'],b2:['b','b'],gb:['g','b']};
 const list=map[kidSel]||[];
 /* 1명이면 왼손, 2명이면 양손(왼/오) */
 kids=list.map((t,i)=>({type:t, side:(list.length===1?-1:(i===0?-1:1))}));
}

const WORLD=5200, GOAL=5000, DUR=300;
let running=false,paused=false,timeLeft=DUR,quizRight=0,quizTotal=0;
let pxx=80,pvy=0,onGround=true,facing=1,walkT=0,camX=0;
let keys={l:false,r:false};
let walls=[],profs=[],sprays=[],confs=[];

/* 벽 10개 배치 */
const wallXs=[500,950,1400,1850,2300,2750,3200,3650,4100,4550];
wallXs.forEach(x=>walls.push({x,hp:1,broken:false,crumble:0}));
/* 지도교수 NPC 3곳 */
[1200,2900,4800].forEach((x,i)=>profs.push({x,greeted:false,msg:['열심히 하고 있구나! 화이팅!','그렇지, 부트스트래핑이지!','거의 다 왔다! 졸업이 눈앞이야!'][i]}));

const hud=document.getElementById('hud'),timerEl=document.getElementById('timer'),progEl=document.getElementById('prog'),
ctrl=document.getElementById('ctrl'),bubble=document.getElementById('bubble');

document.getElementById('goBtn').addEventListener('click',()=>{
 ac();
 const n=document.getElementById('profName').value.trim();
 if(n)profName=n;
 buildKids();
 document.getElementById('startScreen').style.display='none';
 hud.style.display='flex';ctrl.style.display='flex';
 running=true;lastT=performance.now();requestAnimationFrame(loop);
 speak('박사의 여정을 시작합니다! '+profName+' 교수님이 응원하고 있어요!');
});

/* ===== 조작 ===== */
function bindHold(id,key){const b=document.getElementById(id);
 b.addEventListener('pointerdown',e=>{e.preventDefault();keys[key]=true;});
 b.addEventListener('pointerup',()=>keys[key]=false);

/* ================= 루프 ================= */
let lastT=0,pyOff=0;
function groundY(){return H-90;}
function loop(t){
 if(!running)return;
 const dt=Math.min((t-lastT)/1000,.05);lastT=t;
 if(!paused)update(dt);
 draw();
 requestAnimationFrame(loop);
}
function update(dt){
 timeLeft-=dt;
 if(timeLeft<=0){lose();return;}
 timerEl.textContent=Math.floor(timeLeft/60)+':'+String(Math.floor(timeLeft%60)).padStart(2,'0');
 progEl.textContent='🎓 '+Math.min(100,Math.floor(pxx/GOAL*100))+'%';
 const spd=150;
 if(keys.l){pxx-=spd*dt;facing=-1;walkT+=dt*7;}
 if(keys.r){pxx+=spd*dt;facing=1;walkT+=dt*7;}
 pxx=Math.max(30,Math.min(WORLD-30,pxx));
 /* 점프 물리 */
 if(!onGround){pvy+=2400*dt;pyOff+=pvy*dt;
  if(pyOff>=0){pyOff=0;pvy=0;onGround=true;}}
 /* 벽 충돌 → 퀴즈 */
 for(const w of walls){
  if(!w.broken&&pxx>w.x-42&&pxx<w.x){pxx=w.x-42;
   if(!paused)openWallQuiz(w);}
  if(!w.broken&&pxx>w.x&&pxx<w.x+42)pxx=w.x+42;
  if(w.crumble>0)w.crumble-=dt;
 }
 /* 교수 인사 */
 for(const p of profs){
  if(!p.greeted&&Math.abs(pxx-p.x)<120){p.greeted=true;showBubble(p);}
 }
 /* 물줄기 파티클 */
 sprays.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=500*dt;s.l-=dt;});
 sprays=sprays.filter(s=>s.l>0);
 /* 골 도착 */
 if(pxx>=GOAL){winGame();return;}
 camX=Math.max(0,Math.min(WORLD-W,pxx-W*.38));
}
function showBubble(p){

 bubble.innerHTML='<b>'+profName+' 교수</b>: '+p.msg;
 bubble.style.left=Math.max(8,Math.min(W-270,sx-40))+'px';
 bubble.style.top=(groundY()-215)+'px';
 bubble.style.display='block';
 speak(p.msg);
 setTimeout(()=>bubble.style.display='none',3200);
}

/* ---------- 폭죽 ---------- */
const ccv=document.getElementById('confetti'),ccx=ccv.getContext('2d');
function burstConfetti(){
 ccv.width=innerWidth;ccv.height=innerHeight;
 const ps=[];const colors=['#ff5a6e','#ffb347','#5aa9ff','#7bffb0','#ff8ae0','#fff36b'];
 for(let i=0;i<150;i++)ps.push({x:innerWidth/2,y:innerHeight*.55,vx:(Math.random()-.5)*15,vy:-Math.random()*16-4,
  s:Math.random()*7+4,c:colors[i%6],r:Math.random()*Math.PI,vr:(Math.random()-.5)*.3});
 let f=0;
 (function anim(){
  ccx.clearRect(0,0,ccv.width,ccv.height);
  ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.r+=p.vr;
   ccx.save();ccx.translate(p.x,p.y);ccx.rotate(p.r);ccx.fillStyle=p.c;ccx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ccx.restore();});
  if(++f<150)requestAnimationFrame(anim);else ccx.clearRect(0,0,ccv.width,ccv.height);
 })();
}
